name: Build Electron macOS (PPAPI Flash)

# Déclenché manuellement depuis l'onglet Actions
on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: "Architecture cible"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - x64
      electron_branch:
        description: "Branche/tag Electron (ex: 35-x-y, main)"
        required: false
        default: "35-x-y"

jobs:
  build:
    name: Electron macOS ${{ inputs.target_arch }}
    # arm64 → macos-14 (M1), x64 → macos-13 (Intel)
    runs-on: ${{ inputs.target_arch == 'arm64' && 'macos-14' || 'macos-13' }}
    timeout-minutes: 360
    env:
      BUILD_DIR: /tmp/electron-build

    steps:
      # ── 1. Libérer de l'espace disque ──
      - name: Free disk space
        run: |
          echo "=== Disk BEFORE cleanup ==="
          df -h /
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache || true
          ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | head -n -1 | xargs -I{} sudo rm -rf {} || true
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk AFTER cleanup ==="
          df -h /

      # ── 2. Installer depot_tools ──
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      # ── 3. Configurer gclient (PAS d'indentation avant solutions !) ──
      - name: Configure gclient
        run: |
          mkdir -p $BUILD_DIR && cd $BUILD_DIR
          cat > .gclient << 'EOF'
          solutions = [
            {
              "name": "src/electron",
              "url": "https://github.com/electron/electron@${{ inputs.electron_branch }}",
              "deps_file": "DEPS",
              "managed": False,
              "custom_vars": {
                "checkout_mac": True,
                "host_os": "mac",
              },
            },
          ]
          EOF
          # Supprimer l'indentation du heredoc (gclient = Python, sensible à l'indentation)
          sed -i '' 's/^          //' $BUILD_DIR/.gclient
          echo "--- .gclient ---"
          cat .gclient

      # ── 4. Synchroniser Chromium + Electron ──
      - name: Sync sources (gclient)
        working-directory: /tmp/electron-build
        run: |
          # --no-history = shallow clone pour économiser du disque
          gclient sync --with_branch_heads --with_tags --no-history --nohooks -v 2>&1 | tail -200
          echo ""
          echo "=== Running hooks ==="
          gclient runhooks -v 2>&1 | tail -100
          echo ""
          echo "=== Disk after sync ==="
          df -h /
          echo "=== Verify src structure ==="
          ls src/ | head -20
          ls src/electron/ | head -10
        timeout-minutes: 180

      # ── 5. Appliquer le patch PPAPI Flash ──
      - name: Apply PPAPI Flash patch
        working-directory: /tmp/electron-build/src
        run: |
          PATCH_FILE="content/common/pepper_plugin_list.cc"

          echo "=== BEFORE patch ==="
          grep -n -A6 "kMimeTypeAllowlist" "$PATCH_FILE"

          sed -i '' '/"application\/x-blink-deprecated-test-plugin"/i\
                      "application/x-shockwave-flash",' "$PATCH_FILE"

          echo ""
          echo "=== AFTER patch ==="
          grep -n -A7 "kMimeTypeAllowlist" "$PATCH_FILE"

      # ── 6. GN gen ──
      - name: GN gen
        working-directory: /tmp/electron-build/src
        run: |
          GN_ARGS='import("//electron/build/args/release.gn") enable_ppapi = true enable_plugins = true target_cpu = "${{ inputs.target_arch }}"'

          if [ "${{ inputs.target_arch }}" = "x64" ]; then
            GN_ARGS="$GN_ARGS"' v8_snapshot_toolchain = "//build/toolchain/mac:clang_x64"'
          fi

          echo "GN args: $GN_ARGS"
          gn gen out/Release --args="$GN_ARGS"

      # ── 7. Compiler ──
      - name: Build Electron
        working-directory: /tmp/electron-build/src
        run: |
          echo "=== Starting build ==="
          autoninja -C out/Release electron
          echo "=== Build complete! ==="
          ls -lh out/Release/Electron.app/Contents/MacOS/Electron || echo "Electron.app not found"
          df -h /
        timeout-minutes: 300

      # ── 8. Packager ──
      - name: Package Electron.app
        working-directory: /tmp/electron-build/src/out/Release
        run: |
          tar -czf /tmp/electron-mac-${{ inputs.target_arch }}.tar.gz Electron.app/
          ls -lh /tmp/electron-mac-${{ inputs.target_arch }}.tar.gz

      # ── 9. Upload artifact ──
      - name: Upload Electron.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-ppapi-mac-${{ inputs.target_arch }}
          path: /tmp/electron-mac-${{ inputs.target_arch }}.tar.gz
          retention-days: 90

      - name: Final disk space
        if: always()
        run: df -h /
